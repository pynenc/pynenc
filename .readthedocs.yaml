# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install uv
    - uv sync --all-extras --group docs
    - uv run python -m sphinx -b html docs/ $READTHEDOCS_OUTPUT/html
