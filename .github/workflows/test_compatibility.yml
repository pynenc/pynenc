name: Test Dependency Compatibility

on:
  pull_request:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday

jobs:
  test-versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        # Test with minimum and latest versions
        deps-version: ["minimum", "latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (minimum)
        if: matrix.deps-version == 'minimum'
        run: |
          uv pip install --resolution=lowest-direct -e ".[tests]"

      - name: Install dependencies (latest)
        if: matrix.deps-version == 'latest'
        run: |
          uv sync --all-extras

      - name: Run tests
        run: |
          uv run pytest pynenc_tests/
