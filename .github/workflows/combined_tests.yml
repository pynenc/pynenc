name: CombinedTests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --extra monitor --extra tests

      - name: Run unit tests with coverage
        run: uv run pytest pynenc_tests/unit --cov --cov-report=html:htmlcov --cov-report=term

      - name: Upload unit test coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-unit
          path: htmlcov

      - name: Prepare unit coverage file for upload
        run: |
          cp .coverage coverage.unit
          ls -la coverage.unit

      - name: Upload unit test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-unit
          path: coverage.unit

  integration-tests:
    runs-on: ubuntu-latest
    container: python:3.12
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --extra monitor --extra tests

      - name: Run integration tests with coverage (parallel)
        run: uv run pytest pynenc_tests/integration -n auto --dist loadfile --cov --cov-report=html:htmlcov --cov-report=term -m "not slow"

      - name: Upload integration test coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-integration
          path: htmlcov

      - name: Prepare integration coverage file for upload
        run: |
          cp .coverage coverage.integration
          ls -la coverage.integration

      - name: Upload integration test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-integration
          path: coverage.integration

  slow-tests:
    runs-on: ubuntu-latest
    container: python:3.12
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --extra monitor --extra tests

      - name: Run slow tests with coverage
        run: uv run pytest pynenc_tests/integration -n auto --dist loadfile --cov --cov-report=term -m "slow"

      - name: Prepare slow coverage file for upload
        run: |
          cp .coverage coverage.slow
          ls -la coverage.slow

      - name: Upload slow test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-slow
          path: coverage.slow

  all-tests-completed:
    needs: [unit-tests, integration-tests, slow-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra monitor --extra tests

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-data-*"
          path: .
          merge-multiple: true

      - name: List downloaded files (debug)
        run: find . -type f -name 'coverage.*'

      - name: Combine coverage data
        run: uv run coverage combine coverage.unit coverage.integration coverage.slow

      - run: uv run coverage report
      - run: uv run coverage html --show-contexts --title "Combined Test Coverage"

      - name: Upload combined test coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
